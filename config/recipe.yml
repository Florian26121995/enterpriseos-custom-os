modules:
  - type: akmods
    nvidia-driver: nvidia-open
    install: []
  - type: rpm-ostree
    repos:
      - copr:yalter/niri
      - copr:scottames/ghostty
      - https://raw.githubusercontent.com/terrapkg/subatomic-repos/main/terra.repo
    install:
      - niri
      - yazi
      - ghostty
      - greetd-selinux
      - greetd-regreet
      - xorg-xwayland
      - polkit-gnome
      - terra-release
      - noctalia-shell
  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          - com.valvesoftware.Steam
          - com.discordapp.Discord
