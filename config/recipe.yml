modules:
  - type: akmods
    nvidia-driver: nvidia-open
    install: []
  - type: rpm-ostree
    repos:
      - copr:yalter/niri
      - copr:scottames/ghostty
      - https://raw.githubusercontent.com/terrapkg/subatomic-repos/main/terra.repo
    install:
      - niri
      - yazi
      - ghostty
      - greetd
      - greetd-selinux
      - tuigreet
      - xwayland-satellite
      - xdg-desktop-portal-gtk
      - xdg-desktop-portal-gnome
      - terra-release
      - noctalia-shell
  - type: files
    files:
      - usr: /usr
  - type: script
    scripts:
      - build-sysusers-fix.sh
  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          - com.valvesoftware.Steam
          - com.discordapp.Discord
